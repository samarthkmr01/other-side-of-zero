<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Other Side of Zero | Interactive Math</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="dashboard">
        <div class="dash-item">🏆 Streak: <span id="ui-streak">0</span></div>
        <div class="dash-item">⭐ Mastery: <span id="ui-mastery">0%</span></div>
        <div class="dash-item">🚩 Misconceptions Detected: <span id="ui-misconceptions">None</span></div>
        <button id="reset-btn" onclick="resetProgress()">Reset Progress</button>
    </header>

    <main class="container">
        <section id="learning-section" class="card">
            <h2 id="concept-title">Loading...</h2>
            <div id="concept-content"></div>
        </section>

        <section id="assessment-section" class="card">
            <h3>Test Your Knowledge</h3>
            <p id="question-text"></p>
            <div id="options-container"></div>
            
            <div class="support-controls">
                <button id="hint-btn" onclick="requestHint()">💡 Get a Hint</button>
                <p id="hint-text" class="hidden"></p>
            </div>
        </section>

        <div id="remediation-modal" class="modal hidden">
            <div class="modal-content">
                <h2>⚠️ Let's Look Closer!</h2>
                <p id="remediation-text"></p>
                <button onclick="closeRemediation()">I understand, let's try again</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
